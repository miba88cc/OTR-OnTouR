    :root{

      --text:#f5f5f5;
      --muted:#c9cdd3;

      --line:rgba(255,255,255,0.08);
      --max:1180px;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;

      overflow-x:hidden;

    .page-shell{
      min-height:100vh;
      background:

        linear-gradient(180deg, #0b0c0e 0%, #0e1014 100%);
    }

    .navbar{
      position:relative;
      z-index:3;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      padding:28px 42px;
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;
    }

    .logo-img{ height:46px; }

    .nav-links{
      display:flex;
      gap:22px;
      flex-wrap:wrap;
    }

    .nav-links a{ font-size:15px; }

    .nav-cta{
      padding:12px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.06);
    }

    .legal-wrap{
      width:min(920px, calc(100% - 40px));
      margin:0 auto;
      padding:30px 0 90px;
    }

    .legal-card{
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border:1px solid var(--line);
      border-radius:24px;
      padding:40px 34px;
    }

    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      color:var(--gold);
      font-size:14px;
      font-weight:600;
    }

    .eyebrow{
      color:var(--gold);
      letter-spacing:0.16em;
      font-size:12px;
      margin-bottom:12px;
    }

    h1{ font-size:40px; margin-bottom:18px; }
    h2{ font-size:22px; margin-top:30px; }
    p{ font-size:17px; line-height:1.65; color:#d7d7d7; }
